name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Dependencies
      run: |
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android

    - name: Prepare Files for Vite Build
      run: |
        # إنشاء مجلد src ونقل الملفات البرمجية إليه لتتوافق مع إعدادات Vite الافتراضية
        mkdir -p src
        cp App.jsx src/ 2>/dev/null || true
        cp main.jsx src/ 2>/dev/null || true
        cp index.css src/ 2>/dev/null || true

    - name: Build Web Project
      run: |
        npm run build --if-present
        # في حال لم يتم إنشاء مجلد dist، نقوم بإنشائه كنسخة احتياطية
        if [ ! -d "dist" ]; then
          mkdir -p dist
          cp index.html dist/
        fi

    - name: Initialize Capacitor Config if missing
      run: |
        if [ ! -f "capacitor.config.json" ]; then
          npx cap init "Physics App" "com.physics.app" --web-dir=dist
        fi

    - name: Add Android Platform & Sync
      run: |
        npx cap add android || true
        npx cap sync android

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Physics-App-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

